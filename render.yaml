# Full Nudge backend environment for Render Blueprint sync.
# Secrets (sync: false): paste values in the Render dashboard after deploy or sync.
# See docs/RENDER_AZURE_VALUES.md for Azure Portal copy locations.

services:
  - type: web
    name: nudge-mvp-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # --- Python ---
      - key: PYTHON_VERSION
        value: 3.11.10

      # --- Azure OpenAI (text actions) — paste from Azure Portal ---
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-02-15-preview
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      # "true" = Foundry / Studio "View code" (base_url .../openai/v1). Ignores AZURE_OPENAI_API_VERSION.
      - key: AZURE_OPENAI_V1_COMPAT
        value: "false"

      # --- Azure Document Intelligence (OCR) — paste from Azure Portal ---
      - key: AZURE_DOC_INTELLIGENCE_ENDPOINT
        sync: false
      - key: AZURE_DOC_INTELLIGENCE_API_KEY
        sync: false
      - key: AZURE_DOC_INTELLIGENCE_API_VERSION
        value: 2024-11-30
      - key: OCR_POLL_TIMEOUT_SECONDS
        value: "25"

      # --- Auth (production token mode) ---
      - key: NUDGE_AUTH_MODE
        value: token
      - key: NUDGE_TOKEN_SIGNING_KEY
        generateValue: true
      - key: NUDGE_AUTH_ISSUER_ENABLED
        value: "true"
      - key: NUDGE_AUTH_BOOTSTRAP_KEY
        generateValue: true
      - key: NUDGE_ACCESS_TOKEN_TTL_SECONDS
        value: "900"
      - key: NUDGE_REFRESH_TOKEN_TTL_SECONDS
        value: "2592000"
      - key: NUDGE_TOKEN_ISSUER
        value: nudge
      - key: NUDGE_TOKEN_AUDIENCE
        value: nudge-client
      - key: NUDGE_REQUIRED_SCOPE
        value: nudge.api
      - key: NUDGE_ALLOW_LEGACY_API_KEY
        value: "false"
      - key: NUDGE_BACKEND_API_KEY
        sync: false
      - key: NUDGE_REVOKED_TOKEN_JTIS
        value: ""
      # Ephemeral signing keys on Render only if unset; keep false in production once keys are set.
      - key: NUDGE_ALLOW_EPHEMERAL_AUTH_SECRETS
        value: "false"

      # --- License / trial activation (POST /auth/activate) ---
      - key: NUDGE_CUSTOMER_LICENSE_KEYS
        sync: false
      - key: NUDGE_TRIAL_LICENSE_KEYS
        sync: false
      - key: NUDGE_ACTIVATION_RATE_LIMIT_PER_MINUTE
        value: "20"
      - key: NUDGE_LICENSE_DEVICE_BINDING_ENABLED
        value: "true"

      # --- Rate limits & token state (memory on starter; add Redis for scale) ---
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_ACTION_REQUESTS
        value: "30"
      - key: RATE_LIMIT_OCR_REQUESTS
        value: "10"
      - key: RATE_LIMIT_BACKEND
        value: memory
      - key: RATE_LIMIT_FAILURE_MODE
        value: fail_closed
      - key: TOKEN_STATE_BACKEND
        value: memory
      - key: TOKEN_STATE_PREFIX
        value: nudge:auth
      - key: REDIS_URL
        sync: false

      # --- HTTP / proxy / body ---
      - key: TRUSTED_PROXY_CIDRS
        value: ""
      - key: TRUSTED_PROXY_ALLOW_INSECURE_ANY
        value: "false"
      - key: MAX_REQUEST_BODY_BYTES
        value: "10485760"

      # --- Data & optional admin dashboard ---
      - key: LEADS_DB_PATH
        value: data/nudge_leads.db
      - key: ADMIN_DASHBOARD_ENABLED
        value: "false"
      - key: ADMIN_DASHBOARD_USERNAME
        sync: false
      - key: ADMIN_DASHBOARD_PASSWORD
        sync: false

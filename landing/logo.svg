<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="sparkle-grad" x1="340" y1="60" x2="420" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkle-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with indigo gradient -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg-grad)"/>

  <!-- Subtle inner shadow/highlight -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Letter N - bold, modern -->
  <g filter="url(#glow)">
    <path d="M 148 380 L 148 132 C 148 126 152 122 158 122 L 180 122 C 186 122 190 124 193 129 L 320 320 L 320 132 C 320 126 324 122 330 122 L 358 122 C 364 122 368 126 368 132 L 368 380 C 368 386 364 390 358 390 L 336 390 C 330 390 326 388 323 383 L 196 192 L 196 380 C 196 386 192 390 186 390 L 158 390 C 152 390 148 386 148 380 Z" fill="white"/>
  </g>

  <!-- Cyan sparkle/star at top-right -->
  <g filter="url(#sparkle-glow)" transform="translate(380, 100)">
    <!-- 4-point sparkle -->
    <path d="M 0 -36 C 4 -12 12 -4 36 0 C 12 4 4 12 0 36 C -4 12 -12 4 -36 0 C -12 -4 -4 -12 0 -36 Z" fill="url(#sparkle-grad)"/>
    <!-- Small companion sparkle -->
    <path d="M 28 -28 C 30 -20 32 -18 40 -16 C 32 -14 30 -12 28 -4 C 26 -12 24 -14 16 -16 C 24 -18 26 -20 28 -28 Z" fill="#06B6D4" opacity="0.7"/>
  </g>
</svg>
